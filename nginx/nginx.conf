server {
    listen 80;
    server_name localhost;

    # Корневая папка с твоим фронтендом
    root /usr/share/nginx/html/;
    index index.html;

    # Раздача статических файлов (CSS, JS, изображения)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Кэширование статики
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    location ~* \.(js|css)$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }   

    # Проксирование API-запросов (на будущее, когда появится бэкенд)
    location /api/ {
        proxy_pass http://backend:3000;  # имя сервиса из docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Защита от некоторых уязвимостей
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
